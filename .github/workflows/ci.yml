name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release
  CC: gcc-14
  CXX: g++-14

jobs:
  lint:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-14 g++-14 clang-format-19 clang-tidy-19 liburing-dev

    - name: Show toolchain versions
      run: |
        gcc-14 --version
        g++-14 --version
        clang-format-19 --version
        clang-tidy-19 --version

    - name: Check formatting
      run: >
        git ls-files
        'include/**/*.hpp'
        'include/**/*.inl'
        'src/**/*.cpp'
        'app/**/*.cpp'
        'tests/**/*.cpp'
        |
        xargs -r clang-format-19 --dry-run --Werror

    - name: Configure CMake with clang-tidy
      run: >
        cmake
        -B ${{ github.workspace }}/build-tidy
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_C_COMPILER=gcc-14
        -DCMAKE_CXX_COMPILER=g++-14
        -DBUILD_TESTS=OFF
        -DCMAKE_CXX_CLANG_TIDY='clang-tidy-19;--checks=-*,clang-analyzer-*;--warnings-as-errors=*'

    - name: Run clang-tidy
      run: cmake --build ${{ github.workspace }}/build-tidy

  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release
            build_type: Release
            build_dir: build-release
            with_asan_ubsan: OFF
          - name: asan-ubsan
            build_type: Debug
            build_dir: build-asan-ubsan
            with_asan_ubsan: ON

    steps:
    - uses: actions/checkout@v4

    - name: Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-14 g++-14 liburing-dev iproute2 iputils-ping python3

    - name: Show toolchain versions
      run: |
        gcc-14 --version
        g++-14 --version

    - name: Configure CMake
      run: >
        cmake
        -B ${{ github.workspace }}/${{ matrix.build_dir }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_C_COMPILER=gcc-14
        -DCMAKE_CXX_COMPILER=g++-14
        -DWITH_ASAN_UBSAN=${{ matrix.with_asan_ubsan }}

    - name: Build
      run: cmake --build ${{ github.workspace }}/${{ matrix.build_dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ github.workspace }}/${{ matrix.build_dir }}
      run: ctest -C ${{ matrix.build_type }} --output-on-failure

    - name: E2E tunnel smoke
      if: matrix.name == 'release'
      run: sudo timeout 30s tests/e2e/zportald_unix_netns.sh ${{ github.workspace }}/${{ matrix.build_dir }}/app/zportald
